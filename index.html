<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YNW ENGINE | CENTRAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-color: #00ff88; 
            --theme-rgb: 0, 255, 136;
        }

        * { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        body { background: #030303; min-height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        .bg-image-blur {
            position: fixed; inset: -5%; width: 110%; height: 110%;
            background-image: url('imagem1.jpg'); 
            background-size: cover; background-position: center;
            filter: brightness(0.3) blur(5px); /* Blur reduzido conforme pedido */
            z-index: 0; pointer-events: none;
        }

        .bg-grid {
            background-image: linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 50px 50px; position: fixed; inset: 0; z-index: 1;
        }
        
        /* Container Liquid Glass - Blur Suave */
        .liquid-glass { 
            background: rgba(10, 10, 10, 0.4); 
            backdrop-filter: blur(8px) saturate(140%); /* Blur suave */
            -webkit-backdrop-filter: blur(8px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8), 0 0 20px rgba(var(--theme-rgb), 0.1); 
            border-radius: 2rem;
        }

        /* Menus Laterais */
        .side-menu {
            position: fixed; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px;
            padding: 10px; background: rgba(255,255,255,0.03);
            backdrop-filter: blur(5px); border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.05); z-index: 100;
        }
        .menu-left { left: 15px; }
        .menu-right { right: 15px; }

        .dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); }
        .dot.active { border-color: #fff; box-shadow: 0 0 15px var(--theme-color); }

        /* Botões de Comando */
        .cmd-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(var(--theme-rgb), 0.15);
            border-radius: 1.2rem;
            padding: 16px 20px;
            display: flex; align-items: center; gap: 15px;
            cursor: pointer; width: 100%;
        }
        .cmd-btn:hover {
            background: rgba(var(--theme-rgb), 0.1);
            border-color: var(--theme-color);
            box-shadow: 0 0 20px rgba(var(--theme-rgb), 0.2);
            transform: scale(1.02);
        }

        /* Inputs de Dados */
        .glass-input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(var(--theme-rgb), 0.3);
            border-radius: 1rem;
            padding: 12px 15px;
            color: #fff; width: 100%; outline: none;
            font-size: 13px; margin-bottom: 10px;
        }

        .terminal {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            color: var(--theme-color);
            font-family: 'Consolas', monospace;
            font-size: 11px; flex-grow: 1;
            overflow-y: auto;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .hidden { display: none; }
    </style>
</head>
<body class="text-white">
    <div id="main-bg" class="bg-image-blur"></div>
    <div class="bg-grid"></div>

    <div class="side-menu menu-left">
        <div class="dot active" style="background: #00ff88;" onclick="mudarTema('#00ff88', this)"></div>
        <div class="dot" style="background: #ef4444;" onclick="mudarTema('#ef4444', this)"></div>
        <div class="dot" style="background: #a855f7;" onclick="mudarTema('#a855f7', this)"></div>
    </div>

    <div class="side-menu menu-right">
        <div class="dot" style="background-image: url('imagem1.jpg'); background-size: cover;" onclick="mudarFundo('imagem1.jpg', this)"></div>
        <div class="dot" style="background-image: url('imagem2.jpg'); background-size: cover;" onclick="mudarFundo('imagem2.jpg', this)"></div>
        <div class="dot" style="background-image: url('imagem3.jpg'); background-size: cover;" onclick="mudarFundo('imagem3.jpg', this)"></div>
    </div>

    <main class="relative z-10 w-[92%] max-w-[450px] h-[85vh] flex flex-col gap-4">
        <div class="liquid-glass p-6 flex flex-col gap-5 flex-1">
            <div class="text-center">
                <h1 class="text-xl font-black italic tracking-tighter" style="color: var(--theme-color); text-shadow: 0 0 10px var(--theme-color);">YNW ENGINE</h1>
                <p class="text-[9px] uppercase tracking-[0.3em] text-neutral-400 font-bold">Terminal Central V3.0</p>
            </div>

            <div id="main-menu" class="flex flex-col gap-3">
                <div class="cmd-btn" onclick="openTool('radar')">
                    <i data-lucide="satellite" style="color: var(--theme-color);"></i>
                    <span class="text-xs font-bold uppercase tracking-widest">Buscar Novos Sites</span>
                </div>
                <div class="cmd-btn" onclick="openTool('forense')">
                    <i data-lucide="shield-check" style="color: var(--theme-color);"></i>
                    <span class="text-xs font-bold uppercase tracking-widest">Identificar Gateway</span>
                </div>
                <div class="cmd-btn" onclick="execSimpleCmd('HISTORICO')">
                    <i data-lucide="database" style="color: var(--theme-color);"></i>
                    <span class="text-xs font-bold uppercase tracking-widest">Consultar Database</span>
                </div>
            </div>

            <div id="tool-form" class="hidden flex flex-col">
                <p id="form-title" class="text-[10px] uppercase font-bold mb-3 opacity-60"></p>
                <input type="text" id="input-primary" class="glass-input" placeholder="">
                <input type="text" id="input-secondary" class="glass-input hidden" placeholder="">
                <div class="flex gap-2">
                    <button class="flex-1 py-3 rounded-xl font-bold text-xs uppercase" style="background: var(--theme-color); color: #000;" onclick="submitData()">Confirmar</button>
                    <button class="px-4 rounded-xl border border-white/10 text-xs" onclick="closeTool()">Voltar</button>
                </div>
            </div>

            <div id="log" class="terminal">> Operador autorizado...</div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentModule = "";

        function mudarTema(cor, btn) {
            document.documentElement.style.setProperty('--theme-color', cor);
            const r = parseInt(cor.slice(1, 3), 16), g = parseInt(cor.slice(3, 5), 16), b = parseInt(cor.slice(5, 7), 16);
            document.documentElement.style.setProperty('--theme-rgb', `${r}, ${g}, ${b}`);
            document.querySelectorAll('.menu-left .dot').forEach(d => d.classList.remove('active'));
            btn.classList.add('active');
            tg.HapticFeedback.impactOccurred('medium');
        }

        function mudarFundo(img, btn) {
            document.getElementById('main-bg').style.backgroundImage = `url('${img}')`;
            document.querySelectorAll('.menu-right .dot').forEach(d => d.classList.remove('active'));
            btn.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function openTool(module) {
            currentModule = module;
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('tool-form').classList.remove('hidden');
            
            const p1 = document.getElementById('input-primary');
            const p2 = document.getElementById('input-secondary');
            
            if(module === 'radar') {
                document.getElementById('form-title').innerText = "Configurar Varredura";
                p1.placeholder = "Nome do Produto";
                p2.placeholder = "Gateway (Stripe, MP...)";
                p2.classList.remove('hidden');
            } else {
                document.getElementById('form-title').innerText = "Análise Forense";
                p1.placeholder = "Cole a URL do checkout";
                p2.classList.add('hidden');
            }
            tg.HapticFeedback.impactOccurred('soft');
        }

        function closeTool() {
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('tool-form').classList.add('hidden');
        }

        function submitData() {
            const data1 = document.getElementById('input-primary').value;
            const data2 = document.getElementById('input-secondary').value;
            
            if(!data1) return alert("Preencha os campos!");
            
            const command = currentModule === 'radar' ? `VARREDURA:${data1}:${data2}` : `IDENTIFICAR:${data1}`;
            
            // Envia os dados para o bot.py processar
            tg.sendData(command); 
            
            document.getElementById('log').innerHTML += `<br>> Comando enviado: ${command}`;
            closeTool();
            tg.HapticFeedback.notificationOccurred('success');
        }

        function execSimpleCmd(cmd) {
            tg.sendData(cmd);
            document.getElementById('log').innerHTML += `<br>> Solicitando: ${cmd}`;
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
