<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YNW ENGINE | LIQUID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --theme-color: #ef4444; 
            --theme-rgb: 239, 68, 68;
        }

        * { font-family: 'Inter', sans-serif; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: #030303; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        .bg-blur {
            position: fixed; inset: 0;
            background: url('imagem1.jpg') center/cover no-repeat;
            filter: brightness(0.2) blur(2px);
            z-index: 0;
        }

        .glass-container {
            position: relative; z-index: 10;
            width: 92%; height: 90vh;
            background: rgba(10, 10, 10, 0.4);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(var(--theme-rgb), 0.2);
            border-radius: 2.5rem;
            padding: 25px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; gap: 12px;
        }

        /* Estilo image_f94e56 - Menus Expansíveis */
        .expand-menu {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.2rem;
            padding: 14px 20px;
            cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .expand-menu:hover { border-color: var(--theme-color); }

        .expand-content { display: none; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 1rem; margin-top: 5px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo image_fabdfd - Botoes e Inputs */
        .dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); }
        .dot.active { border-color: #fff; box-shadow: 0 0 15px var(--theme-color); }

        .glass-input {
            width: 100%; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 12px; color: #fff; font-size: 12px; outline: none; margin-bottom: 10px;
        }
        .glass-input:focus { border-color: var(--theme-color); }

        .btn-ok-liquid {
            width: 100%; padding: 12px;
            background: transparent; border: 1px solid var(--theme-color);
            color: var(--theme-color); border-radius: 99px;
            font-weight: 900; text-transform: uppercase; font-size: 10px;
            letter-spacing: 2px; cursor: pointer;
        }
        .btn-ok-liquid:hover { background: var(--theme-color); color: #000; box-shadow: 0 0 20px var(--theme-color); }

        .terminal {
            flex-grow: 1; background: rgba(0, 0, 0, 0.5);
            border-radius: 1.5rem; border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 15px; color: var(--theme-color);
            font-family: 'Consolas', monospace; font-size: 10px;
            overflow-y: auto; box-shadow: inset 0 0 20px #000;
        }

        .tool-btn-small {
            width: 100%; padding: 10px; background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 10px;
            text-align: left; font-size: 10px; font-weight: bold; margin-bottom: 5px;
        }
        .tool-btn-small.active { border-color: var(--theme-color); color: var(--theme-color); }
    </style>
</head>
<body class="text-white">
    <div id="bg" class="bg-blur"></div>

    <div class="glass-container">
        <div class="flex justify-between items-center px-2 mb-1">
            <div>
                <h1 class="text-xl font-black italic tracking-tighter" style="color: var(--theme-color); text-shadow: 0 0 10px var(--theme-color);">YNW ENGINE</h1>
                <p class="text-[8px] uppercase tracking-widest text-neutral-500 font-bold">Terminal Liquid Glass V34.0</p>
            </div>
            <div class="bg-white/5 px-3 py-1 rounded-full border border-white/5 flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-[9px] uppercase font-bold text-neutral-400">Online</span>
            </div>
        </div>

        <div class="expand-menu" onclick="toggleMenu('menu-ferramentas')">
            <div class="flex items-center gap-3">
                <i data-lucide="terminal" class="w-4 h-4" style="color: var(--theme-color);"></i>
                <span class="text-[11px] font-bold uppercase tracking-widest">Módulos de Operação</span>
            </div>
            <i data-lucide="chevron-down" class="w-4 h-4 opacity-40"></i>
        </div>
        <div id="menu-ferramentas" class="expand-content">
            <button id="btn-radar" class="tool-btn-small" onclick="selectModule('radar')">📡 BUSCAR NOVOS SITES</button>
            <button id="btn-gate" class="tool-btn-small" onclick="selectModule('gate')">🕵️ IDENTIFICAR GATEWAY</button>
            
            <input type="text" id="input-alvo" class="glass-input mt-3" placeholder="Aguardando seleção...">
            <button class="btn-ok-liquid" onclick="dispararComando()">OK / EXECUTAR</button>
        </div>

        <div class="expand-menu" onclick="toggleMenu('menu-personalizar')">
            <div class="flex items-center gap-3">
                <i data-lucide="settings-2" class="w-4 h-4" style="color: var(--theme-color);"></i>
                <span class="text-[11px] font-bold uppercase tracking-widest">Personalizar Painel</span>
            </div>
            <i data-lucide="chevron-down" class="w-4 h-4 opacity-40"></i>
        </div>
        <div id="menu-personalizar" class="expand-content">
            <p class="text-[9px] mb-2 opacity-50">ESCOLHER TEMA:</p>
            <div class="flex justify-around mb-4">
                <div class="dot" style="background: #ef4444;" onclick="mudarTema('#ef4444', this)"></div>
                <div class="dot" style="background: #10b981;" onclick="mudarTema('#10b981', this)"></div>
                <div class="dot" style="background: #a855f7;" onclick="mudarTema('#a855f7', this)"></div>
            </div>
            <p class="text-[9px] mb-2 opacity-50">ESCOLHER FUNDO:</p>
            <div class="flex justify-around mb-4">
                <div class="dot" style="background-image: url('imagem1.jpg'); background-size: cover;" onclick="mudarFundo('imagem1.jpg', this)"></div>
                <div class="dot" style="background-image: url('imagem2.jpg'); background-size: cover;" onclick="mudarFundo('imagem2.jpg', this)"></div>
                <div class="dot" style="background-image: url('imagem3.jpg'); background-size: cover;" onclick="mudarFundo('imagem3.jpg', this)"></div>
            </div>
            <button class="btn-ok-liquid" onclick="toggleMenu('menu-personalizar')">SALVAR AJUSTES</button>
        </div>

        <div id="terminal" class="terminal">> Console Sincronizado V34.0...</div>
    </div>

    <script>
        lucide.createIcons();
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentModule = "";

        function toggleMenu(id) {
            const el = document.getElementById(id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
            tg.HapticFeedback.impactOccurred('soft');
        }

        function selectModule(mod) {
            currentModule = mod;
            document.querySelectorAll('.tool-btn-small').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mod).classList.add('active');
            document.getElementById('input-alvo').placeholder = mod === 'radar' ? 'Nome do Produto...' : 'URL do Checkout...';
            tg.HapticFeedback.impactOccurred('medium');
        }

        function dispararComando() {
            const alvo = document.getElementById('input-alvo').value;
            if(!currentModule) return alert("Selecione um módulo!");
            if(!alvo) return alert("Preencha o campo!");

            const cmd = currentModule === 'radar' ? `VARREDURA:${alvo}:STRIPE` : `IDENTIFICAR:${alvo}`;
            
            // CONEXÃO COM BOT PYTHON
            tg.sendData(cmd); 
            
            document.getElementById('terminal').innerHTML += `<br>> Comando enviado: ${cmd}`;
            toggleMenu('menu-ferramentas');
            tg.HapticFeedback.notificationOccurred('success');
        }

        function mudarTema(cor, btn) {
            document.documentElement.style.setProperty('--theme-color', cor);
            const r = parseInt(cor.slice(1, 3), 16), g = parseInt(cor.slice(3, 5), 16), b = parseInt(cor.slice(5, 7), 16);
            document.documentElement.style.setProperty('--theme-rgb', `${r}, ${g}, ${b}`);
            document.querySelectorAll('#menu-personalizar .dot').forEach(d => d.classList.remove('active'));
            btn.classList.add('active');
            tg.HapticFeedback.impactOccurred('medium');
        }

        function mudarFundo(img, btn) {
            document.getElementById('bg').style.backgroundImage = `url('${img}')`;
            btn.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }
    </script>
</body>
</html>
