<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YNW ENGINE | LIQUID GLASS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --glow: #ff3c3c; /* Cor padrão */
            --bg: url('imagem1.jpg'); /* Foto padrão */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: #000;
            background-image: var(--bg);
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.5s ease;
        }

        /* Container Liquid Glass */
        .glass-panel {
            width: 95%;
            height: 90vh;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Header Stats */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            cursor: pointer;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .stat-card:hover { border-color: var(--glow); background: rgba(255,255,255,0.05); }
        .stat-card span { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card h2 { font-size: 28px; color: var(--glow); text-shadow: 0 0 10px var(--glow); }

        /* Terminais */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            flex-grow: 1;
        }

        textarea, .terminal {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            color: #fff;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            resize: none;
            overflow-y: auto;
        }

        /* Menus Laterais Flutuantes */
        .side-bar {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 50px;
        }

        .bar-left { left: -45px; }
        .bar-right { right: -45px; }

        .dot {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .img-dot {
            width: 35px;
            height: 35px;
            background-size: cover;
            background-position: center;
        }

        /* Botoes Inferiores */
        .footer-btns { display: flex; gap: 10px; }
        .btn-action {
            flex: 1;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--glow);
            color: var(--glow);
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-action:hover { background: var(--glow); color: #000; box-shadow: 0 0 20px var(--glow); }

        /* Menu de Opções Oculto */
        #tools-menu {
            display: none;
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid var(--glow);
            border-radius: 15px;
            padding: 20px;
            z-index: 999;
            box-shadow: 0 0 30px #000;
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <div class="side-bar bar-left">
            <div class="dot" style="background: #ff3c3c;" onclick="setTheme('#ff3c3c')"></div>
            <div class="dot" style="background: #00ff88;" onclick="setTheme('#00ff88')"></div>
            <div class="dot" style="background: #a33cff;" onclick="setTheme('#a33cff')"></div>
        </div>

        <div class="side-bar bar-right">
            <div class="dot img-dot" style="background-image: url('imagem1.jpg');" onclick="setBg(1)"></div>
            <div class="dot img-dot" style="background-image: url('imagem2.jpg');" onclick="setBg(2)"></div>
            <div class="dot img-dot" style="background-image: url('imagem3.jpg');" onclick="setBg(3)"></div>
        </div>

        <div class="stats-container" onclick="toggleTools()">
            <div class="stat-card"><span>Aprovados</span><h2 id="live">0</h2></div>
            <div class="stat-card"><span>Reprovados</span><h2 id="die" style="color:#fff; text-shadow:none;">0</h2></div>
            <div class="stat-card"><span>Testados</span><h2 id="total">0</h2></div>
        </div>

        <div id="tools-menu">
            <p style="color:var(--glow); margin-bottom:10px;">FERRAMENTAS DISPONÍVEIS:</p>
            <button class="btn-action" style="margin-bottom:10px;" onclick="alert('Iniciando Busca...')">📡 BUSCAR SITES</button>
            <button class="btn-action" onclick="toggleTools()">Fechar</button>
        </div>

        <div class="main-grid">
            <textarea placeholder="cc|mes|ano|cvv"></textarea>
            <div class="terminal" id="log">Aguardando comando...</div>
        </div>

        <div class="footer-btns">
            <button class="btn-action" onclick="iniciar()">▷ INICIAR</button>
            <button class="btn-action" style="border-color:#444; color:#444;">▢ PARAR</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function setTheme(color) {
            document.documentElement.style.setProperty('--glow', color);
            tg.HapticFeedback.impactOccurred('medium');
        }

        function setBg(num) {
            document.documentElement.style.setProperty('--bg', `url('imagem${num}.jpg')`);
            tg.HapticFeedback.impactOccurred('light');
        }

        function toggleTools() {
            const menu = document.getElementById('tools-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
            tg.HapticFeedback.impactOccurred('soft');
        }

        function iniciar() {
            document.getElementById('log').innerHTML += "<br>> Varredura iniciada...";
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
