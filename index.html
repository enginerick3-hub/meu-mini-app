<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YNW ENGINE | CENTRAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-color: #00ff88; 
            --theme-rgb: 0, 255, 136;
        }

        * { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        body { background: #030303; min-height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        .bg-image-blur {
            position: fixed; inset: -5%; width: 110%; height: 110%;
            background-image: url('imagem1.jpg'); 
            background-size: cover; background-position: center;
            filter: brightness(0.2) blur(10px);
            z-index: 0; pointer-events: none;
        }

        .bg-grid {
            background-image: linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 50px 50px; position: fixed; inset: 0; z-index: 1;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
        }
        
        .glow-orb { position: fixed; width: 500px; height: 500px; border-radius: 50%; filter: blur(120px); opacity: 0.15; pointer-events: none; z-index: 1; }
        .orb-1 { background: var(--theme-color); top: -100px; right: -50px; animation: orb-float 10s infinite; }
        @keyframes orb-float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(20px, -20px); } }
        
        /* Container Liquid Glass */
        .liquid-glass { 
            background: rgba(10, 10, 10, 0.2); 
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(var(--theme-rgb), 0.2); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8), 0 0 30px rgba(var(--theme-rgb), 0.15); 
            border-radius: 2rem;
        }

        /* Menus Laterais Flutuantes */
        .side-menu {
            position: fixed; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px;
            padding: 12px; background: rgba(255,255,255,0.02);
            backdrop-filter: blur(10px); border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.05); z-index: 100;
        }
        .menu-left { left: 15px; }
        .menu-right { right: 15px; }

        .dot {
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .dot:hover { border-color: #fff; transform: scale(1.1); }
        .dot.active { border-color: #fff; box-shadow: 0 0 15px var(--theme-color); }

        /* Botões de Comando */
        .cmd-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(var(--theme-rgb), 0.1);
            border-radius: 1.2rem;
            padding: 18px 25px;
            display: flex; align-items: center; gap: 15px;
            cursor: pointer; width: 100%;
        }
        .cmd-btn:hover {
            background: rgba(var(--theme-rgb), 0.08);
            border-color: rgba(var(--theme-rgb), 0.5);
            box-shadow: 0 0 20px rgba(var(--theme-rgb), 0.2);
            transform: translateY(-3px);
        }

        .terminal {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            color: #0f0;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            flex-grow: 1;
            overflow-y: auto;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="text-white">
    <div id="main-bg" class="bg-image-blur"></div>
    <div class="bg-grid"></div>
    <div class="glow-orb orb-1"></div>

    <div class="side-menu menu-left">
        <div class="dot active" style="background: #00ff88;" onclick="mudarTema('#00ff88', this)"></div>
        <div class="dot" style="background: #ef4444;" onclick="mudarTema('#ef4444', this)"></div>
        <div class="dot" style="background: #a855f7;" onclick="mudarTema('#a855f7', this)"></div>
    </div>

    <div class="side-menu menu-right">
        <div class="dot" style="background-image: url('imagem1.jpg'); background-size: cover;" onclick="mudarFundo('imagem1.jpg', this)"></div>
        <div class="dot" style="background-image: url('imagem2.jpg'); background-size: cover;" onclick="mudarFundo('imagem2.jpg', this)"></div>
        <div class="dot" style="background-image: url('imagem3.jpg'); background-size: cover;" onclick="mudarFundo('imagem3.jpg', this)"></div>
    </div>

    <main class="relative z-10 w-[90%] max-w-[500px] h-[85vh] flex flex-col gap-5">
        <div class="liquid-glass p-8 flex flex-col gap-6 flex-1">
            <div class="text-center">
                <h1 class="text-2xl font-black italic tracking-tighter" style="color: var(--theme-color); text-shadow: 0 0 10px var(--theme-color);">YNW ENGINE</h1>
                <p class="text-[10px] uppercase tracking-[0.3em] text-neutral-500 font-bold">Terminal de Controle Central</p>
            </div>

            <div class="flex flex-col gap-3">
                <div class="cmd-btn" onclick="execCmd('BUSCAR SITES')">
                    <i data-lucide="satellite" style="color: var(--theme-color);"></i>
                    <span class="text-xs font-bold uppercase tracking-widest">Buscar Novos Sites</span>
                </div>
                <div class="cmd-btn" onclick="execCmd('IDENTIFICAR GATE')">
                    <i data-lucide="shield-check" style="color: var(--theme-color);"></i>
                    <span class="text-xs font-bold uppercase tracking-widest">Identificar Gateway</span>
                </div>
                <div class="cmd-btn" onclick="execCmd('HISTORICO')">
                    <i data-lucide="database" style="color: var(--theme-color);"></i>
                    <span class="text-xs font-bold uppercase tracking-widest">Consultar Database</span>
                </div>
            </div>

            <div id="log" class="terminal">
                > Operador autorizado.<br>
                > Sistema carregado com sucesso...
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const tg = window.Telegram.WebApp;
        tg.expand();

        function mudarTema(cor, btn) {
            document.documentElement.style.setProperty('--theme-color', cor);
            // Extrai RGB para as bordas e glow
            const r = parseInt(cor.slice(1, 3), 16), g = parseInt(cor.slice(3, 5), 16), b = parseInt(cor.slice(5, 7), 16);
            document.documentElement.style.setProperty('--theme-rgb', `${r}, ${g}, ${b}`);
            
            document.querySelectorAll('.menu-left .dot').forEach(d => d.classList.remove('active'));
            btn.classList.add('active');
            tg.HapticFeedback.impactOccurred('medium');
        }

        function mudarFundo(img, btn) {
            document.getElementById('main-bg').style.backgroundImage = `url('${img}')`;
            document.querySelectorAll('.menu-right .dot').forEach(d => d.classList.remove('active'));
            btn.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function execCmd(cmd) {
            const log = document.getElementById('log');
            log.innerHTML += `<br>> Iniciando módulo: <span style="color: var(--theme-color)">${cmd}</span>`;
            log.scrollTop = log.scrollHeight;
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
